<!DOCTYPE html>
<html>
<head>
  <title>Library Management System</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f4f4f4; }
    button { margin: 2px; padding: 5px 10px; }
  </style>
</head>
<body>
  <h1>Library Management System</h1>

  <!-- Add Book Form -->
  <form id="addBookForm">
    <input type="text" id="bookId" placeholder="Book ID" required>
    <input type="text" id="title" placeholder="Title" required>
    <input type="text" id="author" placeholder="Author" required>
    <button type="submit">Add Book</button>
  </form>

  <!-- Book List -->
  <table id="bookTable">
    <thead>
      <tr>
        <th>Book ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    let books = [];

    // Add Book
    document.getElementById("addBookForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const id = document.getElementById("bookId").value;
      const title = document.getElementById("title").value;
      const author = document.getElementById("author").value;

      books.push({ id, title, author, status: "Available" });
      displayBooks();
      this.reset();
    });

    // Display Books
    function displayBooks() {
      const tbody = document.querySelector("#bookTable tbody");
      tbody.innerHTML = "";
      books.forEach((book, index) => {
        const row = `
          <tr>
            <td>${book.id}</td>
            <td>${book.title}</td>
            <td>${book.author}</td>
            <td>${book.status}</td>
            <td>
              <button onclick="issueBook(${index})">Issue</button>
              <button onclick="returnBook(${index})">Return</button>
            </td>
          </tr>`;
        tbody.innerHTML += row;
      });
    }

    // Issue Book
    function issueBook(index) {
      if (books[index].status === "Available") {
        books[index].status = "Issued";
        displayBooks();
      } else {
        alert("Book is already issued!");
      }
    }

    // Return Book
    function returnBook(index) {
      if (books[index].status === "Issued") {
        books[index].status = "Available";
        displayBooks();
      } else {
        alert("Book is not issued!");
      }
    }
  </script>
</body>
</html>
